trigger:
  branches:
    include:
      - dev

pool:
  name: frontend-agent

stages:
  # -----------------------------------
  # DEV DEPLOY
  # -----------------------------------
  - stage: Dev
    displayName: "Deploy to Development"
    jobs:
      - job: DeployDev
        displayName: "Deploy to Vercel - Dev"
        variables:
          VERCEL_PROJECT_ID: "prj_cDcPKcXRB816a1bqpFWYRsUQ6nd5"
          VERCEL_ORG_ID: "gPLVlvJxaFI0eeU4D9A2btu2"
          VERCEL_TOKEN: "ARyuWAO6SJoPOyVWycwuqALp"

        steps:
          # Install Vercel CLI
          - script: |
              npm install -g vercel@latest
            displayName: "Install Vercel CLI"

          # Clean .vercel folder if exists
          - script: |
              if exist .vercel rmdir /s /q .vercel
            displayName: "Remove existing .vercel folder"

          # Link Project
          - script: |
              vercel link --yes
            displayName: "Link Vercel Project"
            env:
              VERCEL_TOKEN: $(VERCEL_TOKEN)
              VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
              VERCEL_ORG_ID: $(VERCEL_ORG_ID)

          # Pull environment variables
          - script: |
              vercel env pull .env.production --yes
            displayName: "Pull Vercel environment variables"
            env:
              VERCEL_TOKEN: $(VERCEL_TOKEN)

          # Deploy
          - script: |
              vercel deploy --prod --yes
            displayName: "Deploy to Vercel (production)"
            env:
              VERCEL_TOKEN: $(VERCEL_TOKEN)

